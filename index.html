<!--
  ============================================================
  IN & OUT — Hybrid Reality Survival Game
  ============================================================

  HOW TO RUN
  ----------
  1. Open index.html directly in a modern browser (Chrome/Edge/Firefox/Safari).
     No build step, no server needed for basic play.
  2. For microphone access (noise sensor) you MUST serve over HTTPS or localhost.
     Example:  python3 -m http.server 8080  → open http://localhost:8080
  3. On iOS 13+ the motion sensor requires a user-gesture permission prompt.
     Tap the game first, then allow if prompted.

  WHICH SENSORS ARE REAL vs SIMULATED
  ------------------------------------
  Sensor               Real?   Notes
  ─────────────────────────────────────────────────────────
  Microphone / Noise   Real    getUserMedia — needs HTTPS or localhost
  Ambient Light        Real*   AmbientLightSensor API (Chrome+flag or Android)
  Device Tilt/Motion   Real    DeviceOrientation — needs HTTPS on mobile
  Battery Level        Real*   Battery Status API (Chrome Desktop/Android)
  Screen Brightness    Sim     No browser API exposes true screen brightness;
                               use the in-app slider as a gameplay preference
  Time of Day          Real    Reads system clock — always available

  Items marked Real* may fall back to the manual slider in many browsers
  (Firefox, Safari) that have removed these APIs for privacy reasons.

  BROWSER SENSOR SUPPORT LIMITATIONS
  ------------------------------------
  - Firefox: Battery API and AmbientLightSensor removed for privacy.
  - Safari: DeviceOrientation needs user gesture + HTTPS.
  - Chrome Desktop: Microphone works; motion sensor unavailable
    (use fallback keyboard arrow keys or sliders).
  - All sensors degrade gracefully — the game is fully playable
    with all sensors in fallback/simulated mode.
  ============================================================
-->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#080810" />
  <title>IN &amp; OUT — Hybrid Reality Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Single-page app mount point — screens are injected here by router.js -->
  <div id="app">
    <!-- Fallback for very old browsers or JS disabled -->
    <noscript>
      <p style="color:#00ff88;font-family:monospace;padding:20px">
        This game requires JavaScript to run.
      </p>
    </noscript>
    <div style="color:#00ff88;font-family:monospace;padding:20px;text-align:center">
      Loading…
    </div>
  </div>

  <!-- Entry point — type="module" enables ES module imports -->
  <script type="module" src="js/app.js"></script>
</body>
</html>
